<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delta4 | Graph Lens Lite</title>
  <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='4' y='24' font-size='24'>🔍</text></svg>"
        type="image/svg+xml">
  <script src="g6.min.js"></script>
  <script src="xlsx.full.min.js"></script>
  <script src="gll.js"></script>
  <style>
      body, html {
          margin: 0;
          padding: 0;
          height: 100%;
          font-family: sans-serif;
      }

      #mainContent {
          display: flex;
          flex-direction: row;
          height: 100vh;
      }

      .inline {
          display: inline;
      }

      #sidebar {
          min-width: 360px;
          background-color: #f4f4f4;
          padding-left: 10px;
          padding-right: 15px;
          overflow-y: auto;
          overflow-x: hidden;
          transition: min-width 0.2s ease-in-out;
      }

      #outerGraphContainer {
          flex: 1;
          padding: 2px;
      }

      #innerGraphContainer {
          width: 100%;
          height: 100%;
          border: 1px solid #ccc;
      }

      h4 {
          margin: 0.2rem;
          font-weight: 500;
          color: #C33D35;
      }

      h5 {
          margin: 0.2rem;
          font-weight: 300;
      }

      .h7 {
          font-weight: 500;
          font-size: 0.9rem;
          margin: 0.5rem;
      }

      .ml-0 {
          margin-left: 0;
      }

      .ml-1 {
          margin-left: 0.2em;
      }

      #loadingOverlay {
          /* Initially shown */
          flex-direction: column;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.2);
          color: black;
          z-index: 9999;
          text-align: center;
          font-size: 30px;
          transition: opacity 0.2s ease;
      }

      #loadingInnerContent {
          border: 1px solid black;
          border-radius: 20px;
          background: #ffffff;
          padding: 20px 80px 20px 80px;
      }

      .container {
          display: flex;
          justify-content: center;
          align-items: center;
      }

      .container-vertical-aligned {
          display: flex;
          align-items: center;
      }

      .filter-row {
          display: flex;
          align-items: center;
          margin-bottom: 4px;
      }

      .filter-row-col1 {
          width: 66%;
      }

      .filter-row-col2 {
          width: 33%;
          margin-right: 10px;
      }

      .filter-row-col3 {
          display: flex;
          align-items: center;
      }

      /* adapted from https://css-loaders.com */
      .loader {
          width: 40px;
          aspect-ratio: 1;
          display: grid;
          margin: 0 auto;
      }

      .loader::before,
      .loader::after {
          content: "";
          grid-area: 1/1;
          --c: no-repeat radial-gradient(farthest-side, #c33d35 92%, #0000);
          background: var(--c) 50% 0,
          var(--c) 50% 100%,
          var(--c) 100% 50%,
          var(--c) 0 50%;
          background-size: 10px 10px;
          animation: l12 1s infinite;
      }

      .loader::before {
          margin: 3px;
          filter: brightness(0%) saturate(100%) invert(21%) sepia(34%) saturate(445%) hue-rotate(210deg) brightness(95%) contrast(88%);
          background-size: 6px 6px;
          animation-timing-function: linear
      }

      @keyframes l12 {
          100% {
              transform: rotate(.5turn)
          }
      }

      .is-disabled {
          pointer-events: none;
          opacity: 0.5;
          cursor: default;
      }

      .tooltip {
          font-family: sans-serif !important;
          max-width: 640px !important;
          border: 1px solid black;
          /*width: auto;*/
          /*white-space: normal;*/
      }

      .tooltip hr {
          color: #00000033;
      }

      .tooltip h3 {
          margin: 0;
      }

      .tooltip h5 {
          margin: 0;
          line-height: 0.8rem;
          font-weight: 600;
      }

      .tooltip ul {
          margin: 0;
          padding-left: 20px;
          line-height: 0.8rem;
          font-size: 10px;
      }

      .tooltip ul li .red {
          font-size: 11px;
      }

      .tooltip ul li:last-child {
          margin-bottom: 6px;
      }

      .tooltip-columns {
          display: flex;
          gap: 25px;
      }

      .tooltip-column {
          flex: 1;
      }

      .checkboxWrapper {
          display: flex;
          align-items: flex-start;
          gap: 4px;
          cursor: pointer;
      }

      .checkbox {
          display: inline-block;
          width: 12px;
          height: 12px;
          position: relative;
          text-align: center;
          line-height: 12px;
          font-size: 10px;
          font-family: sans-serif;
          flex-shrink: 0;
          /*margin-top: 2px;*/
      }

      .checkboxLabel {
          padding-left: 2px;
          flex-grow: 1;
          font-size: 12px;
      }

      .brown {
          color: #773901;
          border: 1px solid #773901;
      }

      .green {
          color: #015C0C;
      }

      .red {
          color: #C33D35;
      }

      .red-border {
          border: 1px solid #C33D35 !important;
          border-radius: 3px;
      }

      .purple {
          color: #403C53;
      }

      .purple-border {
          border: 1px solid #403C53 !important;
          border-radius: 3px;
      }

      .round-border {
          border-radius: 3px;
      }

      .no-border {
          border: none !important;
      }

      .no-background {
          background: none;
      }

      .small-btn {
          width: 18px;
          height: 18px;
          text-align: center;
          line-height: 18px;
          font-size: 12px;
          border: 1px solid black;
          border-radius: 3px;
          cursor: pointer;
          padding: 0;
      }

      .small-btn.red:hover {
          border: 1px solid #403C53 !important;
      }

      .extra-small {
          width: 14px;
          height: 14px;
          line-height: 14px;
          font-size: 10px;
      }

      .mr {
          margin-right: 4px;
      }

      .hidden {
          opacity: 0;
          pointer-events: none;
      }

      .disabled {
          opacity: 0.5;
          pointer-events: none;
          color: black;
      }

      .showOnLoad {
          opacity: 0;
          pointer-events: none;
      }

      /* range slider CSS start, adapted from https://codeconvey.com/pure-css-range-slider-with-2-handles/ */

      [slider] {
          position: relative;
          height: 8px;
          border-radius: 10px;
          text-align: left;
          margin: 0 0 10px 0;
          overflow: visible;
      }

      [slider] > div {
          position: absolute;
          top: 4px;
          left: 13px;
          right: 15px;
          height: 14px;
      }

      [slider] > div > [inverse-left] {
          position: absolute;
          left: 0;
          height: 8px;
          border-radius: 10px;
          background-color: #CCC;
          margin: 0;
      }

      [slider] > div > [inverse-right] {
          position: absolute;
          right: 0;
          height: 8px;
          border-radius: 10px;
          background-color: #CCC;
          margin: 0;
      }

      [slider] > div > [range] {
          position: absolute;
          left: 0;
          height: 8px;
          border-radius: 14px;
          background-color: #403C53;
      }

      [slider] > div > [thumb] {
          position: absolute;
          top: -3px;
          z-index: 2;
          height: 14px;
          width: 14px;
          text-align: left;
          margin-left: -9px;
          cursor: pointer;
          box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
          background-color: #EEEEEE;
          border-radius: 50%;
          outline: none;
      }

      [slider] > input[type=range] {
          position: absolute;
          pointer-events: none;
          -webkit-appearance: none;
          z-index: 3;
          height: 14px;
          top: -2px;
          width: 100%;
          -ms-filter: "progid:DXImageTransform.Microsoft.Alpha(Opacity=0)";
          filter: alpha(opacity=0);
          -moz-opacity: 0;
          -khtml-opacity: 0;
          opacity: 0;
      }

      div[slider] > input[type=range]::-ms-track {
          -webkit-appearance: none;
          background: transparent;
          color: transparent;
      }

      div[slider] > input[type=range]::-moz-range-track {
          -moz-appearance: none;
          background: transparent;
          color: transparent;
      }

      div[slider] > input[type=range]:focus::-webkit-slider-runnable-track {
          background: transparent;
          border: transparent;
      }

      div[slider] > input[type=range]:focus {
          outline: none;
      }

      div[slider] > input[type=range]::-ms-thumb {
          pointer-events: all;
          width: 28px;
          height: 28px;
          border-radius: 0;
          border: 0 none;
          background: red;
      }

      div[slider] > input[type=range]::-moz-range-thumb {
          pointer-events: all;
          width: 28px;
          height: 28px;
          border-radius: 0;
          border: 0 none;
          background: red;
      }

      div[slider] > input[type=range]::-webkit-slider-thumb {
          pointer-events: all;
          width: 28px;
          height: 28px;
          border-radius: 0;
          border: 0 none;
          background: red;
          -webkit-appearance: none;
      }

      div[slider] > input[type=range]::-ms-fill-lower {
          background: transparent;
          border: 0 none;
      }

      div[slider] > input[type=range]::-ms-fill-upper {
          background: transparent;
          border: 0 none;
      }

      div[slider] > input[type=range]::-ms-tooltip {
          display: none;
      }

      [slider] > div > [sign] {
          opacity: 0;
          position: absolute;
          margin-left: -56px; /* controls horizontal position of left tooltip */
          top: -8px;
          z-index: 3;
          background-color: #C33D35;
          border: 1px solid #403C53;
          color: #E4E3EA;
          width: 32px;
          height: 24px;
          border-radius: 28px;
          -webkit-border-radius: 28px;
          align-items: center;
          -webkit-justify-content: center;
          justify-content: center;
          text-align: center;
          pointer-events: none;
          transition: opacity 0.2s ease-in-out;
      }

      [slider] > div > [sign].left {
          position: absolute;
          white-space: nowrap;
      }

      [slider] > div > [sign].right {
          position: absolute;
          white-space: nowrap;
      }

      /* Flipped state for labels */
      [slider] > div > [sign].left.flipped {
          transform: translateX(12px); /* Move closer to the slider to fill the gap */
      }

      [slider] > div > [sign].right.flipped {
          transform: translateX(-12px); /* Move closer to the slider to fill the gap */
      }

      [slider] > div > [sign].left:after {
          position: absolute;
          content: '';
          top: 50%;
          right: -10px; /* controls horizontal position of left tooltip anchor */
          transform: translateY(-50%);
          border-top: 6px solid transparent;
          border-bottom: 6px solid transparent;
          border-left: 8px solid #403C53;
      }

      [slider] > div > [sign].right:after {
          position: absolute;
          content: '';
          top: 50%;
          left: -10px; /* controls horizontal position of right tooltip anchor */
          transform: translateY(-50%);
          border-top: 6px solid transparent;
          border-bottom: 6px solid transparent;
          border-right: 8px solid #403C53;
      }

      [slider] > div > [sign].left.flipped:after {
          right: auto;
          left: -10px; /* Reverses the arrow position */
          border-left: none;
          border-right: 8px solid #C33D35; /* Reverse the arrow direction */
      }

      [slider] > div > [sign].right.flipped:after {
          left: auto;
          right: -10px; /* Reverses the arrow position */
          border-right: none;
          border-left: 8px solid #C33D35; /* Reverse the arrow direction */
      }

      [slider] > div > [sign] > span {
          font-size: 10px;
          font-weight: 500;
          line-height: 14px;
          align-items: center;
          justify-content: center;
          text-align: center;
      }

      [slider]:hover > div > [sign] {
          opacity: 1;
      }

      /* range slider css end */

      /* toggle switch css start, adapted from https://www.w3schools.com/howto/howto_css_switch.asp */
      .switch {
          position: relative;
          display: inline-block;
          width: 30px;
          height: 16px;
      }

      .switch input {
          opacity: 0;
          width: 0;
          height: 0;
      }

      .slider {
          position: absolute;
          cursor: pointer;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background-color: #ccc;
          -webkit-transition: .2s;
          transition: .2s;
      }

      .slider:before {
          position: absolute;
          content: "";
          height: 12px;
          width: 12px;
          left: 2px;
          bottom: 2px;
          background-color: white;
          -webkit-transition: .2s;
          transition: .2s;
      }

      input:checked + .slider {
          background-color: #403C53;
      }

      input:focus + .slider {
          box-shadow: 0 0 1px #403C53;
      }

      input:checked + .slider:before {
          -webkit-transform: translateX(14px);
          -ms-transform: translateX(14px);
          transform: translateX(14px);
      }

      .slider.round {
          border-radius: 16px;
      }

      .slider.round:before {
          border-radius: 50%;
      }

      /* toggle switch css end */

      /* Round 4-way circle button */
      .circle-button {
          position: relative;
          width: 18px;
          height: 18px;
          border-radius: 50%;
          overflow: hidden;
          display: inline-flex;
          justify-content: center;
          align-items: center;
          transition: transform 0.2s ease;
      }

      .circle-button:hover {
          transform: scale(2.5);
          cursor: pointer;
          z-index: 1;
      }

      .quadrant {
          position: absolute;
          width: 100%;
          height: 100%;
          background-color: transparent;
          border: 10px solid transparent;
          box-sizing: border-box;
          clip-path: inset(0 0 0 0);
          transition: background-color 0.3s ease, border-color 0.3s ease;
          pointer-events: all;
          cursor: pointer;
          /*filter: grayscale(50%);*/
      }

      .top-left {
          clip-path: polygon(0 0, 50% 0, 50% 50%, 0 50%);
          border-top-left-radius: 50%;
          border-width: 0.125rem;
          border-left-color: #403C53;
          border-top-color: #403C53;
          background-color: #E4E3EA;
      }

      .top-left.active {
          background-color: #403C53;
          border-left-color: #000000;
          border-top-color: #000000;
      }

      .top-right {
          clip-path: polygon(50% 0, 100% 0, 100% 50%, 50% 50%);
          border-width: 0.125rem;
          border-top-right-radius: 50%;
          border-right-color: #C33D35;
          border-top-color: #C33D35;
          background-color: #E4E3EA;
      }

      .top-right.active {
          background-color: #C33D35;
          border-right-color: #000000;
          border-top-color: #000000;
      }

      .bottom-left {
          clip-path: polygon(0 50%, 50% 50%, 50% 100%, 0 100%);
          border-width: 0.125rem;
          border-bottom-left-radius: 50%;
          border-left-color: #EFB0AA;
          border-bottom-color: #EFB0AA;
          background-color: #E4E3EA;
      }

      .bottom-left.active {
          background-color: #EFB0AA;
          border-left-color: #000000;
          border-bottom-color: #000000;
      }

      .bottom-right {
          clip-path: polygon(50% 50%, 100% 50%, 100% 100%, 50% 100%);
          border-width: 0.125rem;
          border-bottom-right-radius: 50%;
          border-right-color: #8CA6D9;
          border-bottom-color: #8CA6D9;
          background-color: #E4E3EA;
      }

      .bottom-right.active {
          background-color: #8CA6D9;
          border-right-color: #000000;
          border-bottom-color: #000000;
      }

      .quadrant:hover {
          /*background-color: rgba(255, 255, 255, 0.4);*/
          /*filter: grayscale(0%);*/
          cursor: pointer;
      }

      /* Round 4-way circle button end */

      /* dropdown checklist css start */

      .dropdown-check-list {
          display: inline-block;
      }

      .dropdown-check-list:focus-visible,
      .dropdown-check-list *:focus-visible {
          outline: none;
          box-shadow: none;
      }

      .dropdown-check-list .anchor {
          position: relative;
          cursor: pointer;
          display: inline-block;
          /*padding: 5px 5px 5px 10px;*/
          border: 1px solid #ccc;
          width: 90%;
          height: 16px;
          line-height: 16px;
          padding: 0 8px 0 4px;
          text-overflow: ellipsis;
          white-space: nowrap;
          margin: 0 0 0 4px;
      }

      .dropdown-check-list .anchor:after {
          position: absolute;
          content: "";
          border-left: 2px solid black;
          border-top: 2px solid black;
          padding: 2px;
          right: 5px;
          top: 25%;
          transform: rotate(-135deg);
      }

      .dropdown-check-list ul.items {
          position: fixed;
          padding: 2px;
          display: none;
          margin: 0 0 0 3px;
          border: 1px solid #ccc;
          border-radius: 3px;
          border-top: none;
          /*position: absolute;*/
          background-color: white;
          z-index: 1000;
          width: auto;
          list-style: none;
          box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.5)

      }

      .dropdown-check-list ul.items li {
          padding: 3px 5px 3px 5px;
          font-size: 14px;
      }

      .dropdown-check-list ul.items li label {
          cursor: pointer;
          align-items: center;
      }

      .dropdown-check-list ul.items li input[type="checkbox"] {
          display: none;
      }

      .custom-checkbox {
          display: inline-block;
          width: 14px;
          height: 14px;
          margin-right: 10px;
          border: 1px solid #C33D35;
          border-radius: 3px;
          background-color: white;
          vertical-align: middle;
          transition: background-color 0.3s ease, border-color 0.3s ease;
      }

      .custom-checkbox.checked {
          background-color: #C33D35;
          color: white;
          position: relative;
      }

      .custom-checkbox.checked::after {
          content: "✔";
          font-size: 14px;
          color: white;
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
      }

      .custom-checkbox:hover {
          border-color: #A02929;
          background-color: #FFE5E5;
      }

      .dropdown-check-list.visible .items {
          display: block;
      }

      .dropdown-check-list.visible .anchor {
          color: #C33D35;
      }

      .dropdown-buttons {
          display: flex;
          justify-content: center;
          gap: 10px;
          padding: 5px;
          background-color: #f8f8f8;
          border-bottom: 1px solid #ccc;
      }

      .dropdown-buttons.button {
          font-size: 12px;
          padding: 4px 8px;
          border: 1px solid #ccc;
          border-radius: 3px;
          cursor: pointer;
          background-color: white;
          transition: background-color 0.3s ease;
      }

      /* dropdown checklist css end */

      .edit-btn {
          box-shadow: none;
          transition: box-shadow 0.2s ease-in-out;
      }

      .edit-btn.active {
          box-shadow: 0 0 5px #C33D35;
      }

      .show-on-edit {
          display: none;
      }

      .show-on-edit.show {
          display: inline-block;
          /*width: 100%;*/
          width: auto;
          height: auto;
          transition: width 0.2s ease-in-out, height 0.2s ease-in-out;
      }

  </style>
</head>
<body>
<div id="loadingOverlay" class="container">
  <div id="loadingInnerContent">
    <div class="loader"></div>
    <h3 id="loadingHeader">Loading ..</h3>
    <span id="loadingText" class="h7">Please wait</span>
  </div>
</div>
<div id="mainContent">
  <div id="sidebar">
    <h3>Load Model</h3>
    <input type="file" id="fileInput" name="fileInput" onchange="loadFileWrapper(event);" accept=".json, .xls, .xlsx, .csv, .tab"/>
    <button id="exportModel" class="showOnLoad" onclick="exportGraphAsJSON()" title="Save Model (S)">💾</button>
    <button id="exportImage" class="showOnLoad" onclick="exportPNG()" title="Save Image (P)">📷️</button>
    <div class="showOnLoad">
      <hr>
      <h3>Network Options</h3>
      <label for="layout">Choose View:</label>
      <select name="layout" id="layout" onchange="changeLayout()" style="margin-bottom:10px;"></select>
      <button class="small-btn" id="resetLayoutButton" onclick="resetLayout()" title="Reset View Arrangement (R)">⭯
      </button>
      <button class="small-btn" onclick="graph.fitView()" title="Fit View in Viewport (F)">⛶</button>
      <button class="small-btn green" onclick="addLayout()" title="Create New View">✚</button>
      <button class="small-btn red disabled" onclick="removeSelectedLayout()" id="removeSelectedLayoutButton"
              title="Remove Layout">✗
      </button>
      <button class="small-btn show-on-edit" title="Save filter settings to stash (to be reapplied in different view)" onclick="saveFiltersToStash()">📥</button>
      <button class="small-btn show-on-edit" title="Load filter settings from stash" onclick="loadFiltersFromStash()">📤</button>
      <button class="small-btn edit-btn" id="editBtn" onclick="toggleEditMode(this)" title="Enter Edit mode (E)">⚙
      </button>
      <br>
      <div class="edit-container show-on-edit">
        <p id="selectedNodesStatus">Selected nodes: 0</p>
      </div>
      <h5 class="purple">
        <span id="visibleNodes" class="red">0</span>/<span id="totalNodes">0</span> nodes |
        <span id="visibleEdges" class="red">0</span>/<span id="totalEdges">0</span> edges active
      </h5>
      <hr>
      <div id="filterContainer"></div>
    </div>
  </div>
  <div id="outerGraphContainer">
    <div id="innerGraphContainer"></div>
  </div>
</div>
</body>
</html>
