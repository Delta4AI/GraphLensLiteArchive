  <style>
      body, html {
          margin: 0;
          padding: 0;
          height: 100%;
          font-family: sans-serif;
      }

      #mainContent {

          flex-direction: row;

          width: 100%;

      }

      }

          padding-left: 10px;

          overflow-x: hidden;

          display: flex;
          flex-direction: column;
          flex-shrink: 0;
      }

      #sidebarContentContainer {
          flex: 1;
          overflow-y: auto;
          overflow-x: hidden;
      }

      #sidebarStatusContainer {
          display: flex;

          flex-direction: column;

      #queryEditor {

          border-radius: 5px;
          box-sizing: border-box;
      }

      #queryTextArea,

          tab-size: 4;
          margin: 0;
          inset: 0;
          overflow-y: auto;
          overflow-x: hidden;
      }

      #queryOverlay {
          position: absolute;
          pointer-events: none;
          z-index: 0;
      }

      #queryTextArea {

      /* little arrow pointing at the bracket */

      /* adapted from https://css-loaders.com */
      .loader {
          width: 40px;
          aspect-ratio: 1;
          display: grid;
          margin: 0 auto;
      }

      .loader::before,
      .loader::after {
          content: "";
          grid-area: 1/1;
          --c: no-repeat radial-gradient(farthest-side, #c33d35 92%, #0000);
          background: var(--c) 50% 0,
          var(--c) 50% 100%,
          var(--c) 100% 50%,
          var(--c) 0 50%;
          background-size: 10px 10px;
          animation: l12 1s infinite;
      }

      .loader::before {
          margin: 3px;
          filter: brightness(0%) saturate(100%) invert(21%) sepia(34%) saturate(445%) hue-rotate(210deg) brightness(95%) contrast(88%);
          background-size: 6px 6px;
          animation-timing-function: linear
      }

      @keyframes l12 {
          100% {
              transform: rotate(.5turn)
          }
      }

      /*************************
       range slider CSS
       adapted from https://codeconvey.com/pure-css-range-slider-with-2-handles/
       **************************/

      [slider] {
          position: relative;
          height: 8px;
          border-radius: 10px;
          text-align: left;
          margin: 0 0 10px 0;
          overflow: visible;
      }

      [slider] > div {
          position: absolute;
          top: 4px;
          left: 13px;
          right: 15px;
          height: 14px;
      }

      [slider] > div > [inverse-left] {
          position: absolute;
          left: 0;
          height: 8px;
          border-radius: 10px;
          background-color: #CCC;
          margin: 0;
      }

      [slider] > div > [inverse-right] {
          position: absolute;
          right: 0;
          height: 8px;
          border-radius: 10px;
          background-color: #CCC;
          margin: 0;
      }

      [slider] > div > [range] {
          position: absolute;
          left: 0;
          height: 8px;
          border-radius: 14px;
          background-color: #403C53;
      }

      [slider] > div > [thumb] {
          position: absolute;
          top: -3px;
          z-index: 2;
          height: 14px;
          width: 14px;
          text-align: left;
          margin-left: -9px;
          cursor: pointer;
          box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
          background-color: #EEEEEE;
          border-radius: 50%;
          outline: none;
      }

      [slider] > input[type=range] {
          position: absolute;
          pointer-events: none;
          -webkit-appearance: none;
          z-index: 3;
          height: 14px;
          top: -2px;
          width: 100%;
          -ms-filter: "progid:DXImageTransform.Microsoft.Alpha(Opacity=0)";
          filter: alpha(opacity=0);
          -moz-opacity: 0;
          -khtml-opacity: 0;
          opacity: 0;
      }

      div[slider] > input[type=range]::-ms-track {
          -webkit-appearance: none;
          background: transparent;
          color: transparent;
      }

      div[slider] > input[type=range]::-moz-range-track {
          -moz-appearance: none;
          background: transparent;
          color: transparent;
      }

      div[slider] > input[type=range]:focus::-webkit-slider-runnable-track {
          background: transparent;
          border: transparent;
      }

      div[slider] > input[type=range]:focus {
          outline: none;
      }

      div[slider] > input[type=range]::-ms-thumb {
          pointer-events: all;
          width: 28px;
          height: 28px;
          border-radius: 0;
          border: 0 none;
          background: red;
      }

      div[slider] > input[type=range]::-moz-range-thumb {
          pointer-events: all;
          width: 28px;
          height: 28px;
          border-radius: 0;
          border: 0 none;
          background: red;
      }

      div[slider] > input[type=range]::-webkit-slider-thumb {
          pointer-events: all;
          width: 28px;
          height: 28px;
          border-radius: 0;
          border: 0 none;
          background: red;
          -webkit-appearance: none;
      }

      div[slider] > input[type=range]::-ms-fill-lower {
          background: transparent;
          border: 0 none;
      }

      div[slider] > input[type=range]::-ms-fill-upper {
          background: transparent;
          border: 0 none;
      }

      div[slider] > input[type=range]::-ms-tooltip {
          display: none;
      }

      [slider] > div > [sign] {
          opacity: 0;
          position: absolute;
          margin-left: -56px; /* controls horizontal position of left tooltip */
          top: -8px;
          z-index: 3;
          background-color: #C33D35;
          border: 1px solid #403C53;
          color: #E4E3EA;
          width: 32px;
          height: 24px;
          border-radius: 28px;
          -webkit-border-radius: 28px;
          align-items: center;
          -webkit-justify-content: center;
          justify-content: center;
          text-align: center;
          pointer-events: none;
          transition: opacity 0.2s ease-in-out;
      }

      [slider] > div > [sign].left {
          position: absolute;
          white-space: nowrap;
      }

      [slider] > div > [sign].right {
          position: absolute;
          white-space: nowrap;
      }

      /* Flipped state for labels */
      [slider] > div > [sign].left.flipped {
          transform: translateX(12px); /* Move closer to the slider to fill the gap */
      }

      [slider] > div > [sign].right.flipped {
          transform: translateX(-12px); /* Move closer to the slider to fill the gap */
      }

      [slider] > div > [sign].left:after {
          position: absolute;
          content: '';
          top: 50%;
          right: -10px; /* controls horizontal position of left tooltip anchor */
          transform: translateY(-50%);
          border-top: 6px solid transparent;
          border-bottom: 6px solid transparent;
          border-left: 8px solid #403C53;
      }

      [slider] > div > [sign].right:after {
          position: absolute;
          content: '';
          top: 50%;
          left: -10px; /* controls horizontal position of right tooltip anchor */
          transform: translateY(-50%);
          border-top: 6px solid transparent;
          border-bottom: 6px solid transparent;
          border-right: 8px solid #403C53;
      }

      [slider] > div > [sign].left.flipped:after {
          right: auto;
          left: -10px; /* Reverses the arrow position */
          border-left: none;
          border-right: 8px solid #C33D35; /* Reverse the arrow direction */
      }

      [slider] > div > [sign].right.flipped:after {
          left: auto;
          right: -10px; /* Reverses the arrow position */
          border-right: none;
          border-left: 8px solid #C33D35; /* Reverse the arrow direction */
      }

      [slider] > div > [sign] > span {
          font-size: 10px;
          font-weight: 500;
          line-height: 14px;
          align-items: center;
          justify-content: center;
          text-align: center;
      }

      [slider]:hover > div > [sign] {
          opacity: 1;
      }

      /*************************
       toggle switch css start
       adapted from https://www.w3schools.com/howto/howto_css_switch.asp
       **************************/

      .switch {
          position: relative;
          display: inline-block;
          width: 30px;
          height: 16px;
      }

      .switch input {
          opacity: 0;
          width: 0;
          height: 0;
      }

      .slider {
          position: absolute;
          cursor: pointer;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background-color: #ccc;
          -webkit-transition: .2s;
          transition: .2s;
      }

      .slider:before {
          position: absolute;
          content: "";
          height: 12px;
          width: 12px;
          left: 2px;
          bottom: 2px;
          background-color: white;
          -webkit-transition: .2s;
          transition: .2s;
      }

      input:checked + .slider {
          background-color: #403C53;
      }

      input:focus + .slider {
          box-shadow: 0 0 1px #403C53;
      }

      input:checked + .slider:before {
          -webkit-transform: translateX(14px);
          -ms-transform: translateX(14px);
          transform: translateX(14px);
      }

      .slider.round {
          border-radius: 16px;
      }

      .slider.round:before {
          border-radius: 50%;
      }

      /*************************
       Round 4-way circle button
       **************************/

      .circle-button {
          position: relative;
          width: 18px;
          height: 18px;
          border-radius: 50%;
          overflow: hidden;
          display: inline-flex;
          justify-content: center;
          align-items: center;
          transition: transform 0.2s ease;
      }

      .circle-button:hover {
          transform: translateX(-75%) scale(2.5);
          cursor: pointer;
          z-index: 99;
      }

      .quadrant {
          position: absolute;
          width: 100%;
          height: 100%;
          background-color: transparent;
          border: 10px solid transparent;
          box-sizing: border-box;
          clip-path: inset(0 0 0 0);
          transition: background-color 0.3s ease, border-color 0.3s ease;
          pointer-events: all;
          cursor: pointer;
          /*filter: grayscale(50%);*/
      }

      .top-left {
          clip-path: polygon(0 0, 50% 0, 50% 50%, 0 50%);
          border-top-left-radius: 50%;
          border-width: 0.125rem;
          border-left-color: #403C53;
          border-top-color: #403C53;
          background-color: #E4E3EA;
      }

      .top-left.active {
          background-color: #403C53;
          border-left-color: #000000;
          border-top-color: #000000;
      }

      .top-right {
          clip-path: polygon(50% 0, 100% 0, 100% 50%, 50% 50%);
          border-width: 0.125rem;
          border-top-right-radius: 50%;
          border-right-color: #C33D35;
          border-top-color: #C33D35;
          background-color: #E4E3EA;
      }

      .top-right.active {
          background-color: #C33D35;
          border-right-color: #000000;
          border-top-color: #000000;
      }

      .bottom-left {
          clip-path: polygon(0 50%, 50% 50%, 50% 100%, 0 100%);
          border-width: 0.125rem;
          border-bottom-left-radius: 50%;
          border-left-color: #EFB0AA;
          border-bottom-color: #EFB0AA;
          background-color: #E4E3EA;
      }

      .bottom-left.active {
          background-color: #EFB0AA;
          border-left-color: #000000;
          border-bottom-color: #000000;
      }

      .bottom-right {
          clip-path: polygon(50% 50%, 100% 50%, 100% 100%, 50% 100%);
          border-width: 0.125rem;
          border-bottom-right-radius: 50%;
          border-right-color: #8CA6D9;
          border-bottom-color: #8CA6D9;
          background-color: #E4E3EA;
      }

      .bottom-right.active {
          background-color: #8CA6D9;
          border-right-color: #000000;
          border-bottom-color: #000000;
      }

      .quadrant:hover {
          /*background-color: rgba(255, 255, 255, 0.4);*/
          /*filter: grayscale(0%);*/
          cursor: pointer;
      }

      /*************************
       dropdown checklist
       **************************/

      .dropdown-check-list {
          display: inline-block;
      }

      .dropdown-check-list:focus-visible,
      .dropdown-check-list *:focus-visible {
          outline: none;
          box-shadow: none;
      }

      .dropdown-check-list .anchor {
          position: relative;
          cursor: pointer;
          display: inline-block;
          /*padding: 5px 5px 5px 10px;*/
          border: 1px solid #ccc;
          width: 90%;
          height: 16px;
          line-height: 16px;
          padding: 0 8px 0 4px;
          text-overflow: ellipsis;
          white-space: nowrap;
          margin: 0 0 0 4px;
      }

      .dropdown-check-list .anchor:after {
          position: absolute;
          content: "";
          border-left: 2px solid black;
          border-top: 2px solid black;
          padding: 2px;
          right: 5px;
          top: 25%;
          transform: rotate(-135deg);
      }

      .dropdown-check-list ul.items {
          position: fixed;
          padding: 2px;
          display: none;
          margin: 0 0 0 3px;
          border: 1px solid #ccc;
          border-radius: 3px;
          border-top: none;
          /*position: absolute;*/
          background-color: white;
          z-index: 1000;
          width: auto;
          list-style: none;
          box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.5)

      }

      .dropdown-check-list ul.items li {
          padding: 3px 5px 3px 5px;
          font-size: 14px;
      }

      .dropdown-check-list ul.items li label {
          cursor: pointer;
          align-items: center;
      }

      .dropdown-check-list ul.items li input[type="checkbox"] {
          display: none;
      }

      .custom-checkbox {
          display: inline-block;
          width: 14px;
          height: 14px;
          margin-right: 10px;
          border: 1px solid #C33D35;
          border-radius: 3px;
          background-color: white;
          vertical-align: middle;
          transition: background-color 0.3s ease, border-color 0.3s ease;
      }

      .custom-checkbox.checked {
          background-color: #C33D35;
          color: white;
          position: relative;
      }

      .custom-checkbox.checked::after {
          content: "✔";
          font-size: 14px;
          color: white;
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
      }

      .custom-checkbox:hover {
          border-color: #A02929;
          background-color: #FFE5E5;
      }

      .dropdown-check-list.visible .items {
          display: block;
      }

      .dropdown-check-list.visible .anchor {
          color: #C33D35;
      }

      .dropdown-buttons {
          display: flex;
          justify-content: center;
          gap: 10px;
          padding: 5px;
          background-color: #f8f8f8;
          border-bottom: 1px solid #ccc;
      }

      .dropdown-buttons.button {
          font-size: 12px;
          padding: 4px 8px;
          border: 1px solid #ccc;
          border-radius: 3px;
          cursor: pointer;
          background-color: white;
          transition: background-color 0.3s ease;
      }
  </style>
</head>
<body>
<div id="loadingOverlay" class="container">
  <div id="loadingInnerContent">
    <div class="loader"></div>
    <h3 id="loadingHeader">Loading ..</h3>
    <span id="loadingText" class="h7">Please wait</span>
  </div>
</div>
<div id="mainContent">
  <div id="sidebar">
    <div id="sidebarContentContainer">
      <h3>Graph Lens Lite</h3>
      <input type="file" id="fileInput" name="fileInput" onchange="loadFileWrapper(event);"
             accept=".json, .xls, .xlsx, .csv, .tab"/>
      <button id="exportModel" class="showOnLoad" onclick="exportGraphAsJSON()" title="Save Model (S)">💾</button>
      <button id="exportImage" class="showOnLoad" onclick="exportPNG()" title="Save Image (P)">📷️</button>
      <div class="showOnLoad">
        <hr>
        <h3>Network Options</h3>
        <label for="layout">Network View:</label>
        <select name="layout" id="layout" onchange="changeLayout()" style="margin-bottom:10px;"></select>
        <button class="small-btn" id="resetLayoutButton" onclick="resetLayout()" title="Reset View Arrangement (R)">⭯
        </button>
        <button class="small-btn" onclick="graph.fitView()" title="Fit View in Viewport (F)">⛶</button>
        <button class="small-btn green show-on-edit" onclick="addLayout()" title="Create New View">&nbsp;✚&nbsp;
        </button>
        <button class="small-btn red show-on-edit disabled" onclick="removeSelectedLayout()"
                id="removeSelectedLayoutButton"
                title="Remove Layout">&nbsp;✗&nbsp;
        </button>
        <button class="small-btn show-on-edit" title="Save filter settings to stash (to be reapplied in different view)"
                onclick="saveFiltersToStash(true)">📥
        </button>
        <button class="small-btn show-on-edit disabled" title="Load filter settings from stash" id="loadFromStashBtn"
                onclick="loadFiltersFromStash()">
          📤
        </button>
        <button class="small-btn red" onclick="toggleCleanUpDanglingElements(this)"
                title="Hide all nodes and edges that are not connected to any other node or edge.">🚫
        </button>
        <button class="small-btn edit-btn" id="editBtn" onclick="toggleEditMode(this)" title="Enter Edit mode (E)">⚙
        </button>
        <div id="debugDiv" style="display: inline;"></div>
        <br>
        <h5 class="purple">Shown:
          <span id="visibleNodes" class="red">0</span>/<span id="totalNodes">0</span> nodes,
          <span id="visibleEdges" class="red">0</span>/<span id="totalEdges">0</span> edges
          <span class="show-on-edit"> | Selection:
            <span class="red" id="selectedNodes">0</span> nodes,
            <span class="red" id="selectedEdges">0</span> edges |
            <button class="small-btn disabled" title="Undo Selection" id="undoSelectionBtn"
                    onclick="undoSelection()">↩</button>
            <button class="small-btn disabled" title="Redo Selection" id="redoSelectionButton"
                    onclick="redoSelection()">↪</button>
          </span>
        </h5>
        <hr>
        <div class="edit-container show-on-edit">
          <div id="staticStyleDiv"></div>
          <hr>
        </div>
        <div id="filterContainer"></div>
      </div>
    </div>
    <div id="sidebarStatusContainer">

    </div>
  </div>
  <div id="outerGraphContainer">
    <div id="innerGraphContainer"></div>
  </div>
</div>
<div id="bottomBar">
  <div id="queryEditor">
    <div id="queryOverlay" aria-hidden="true"></div>
    <div id="queryTextArea" contenteditable="true" spellcheck="false" oninput="handleQueryValidationEvent();"></div>
    <div id="queryCaret" class="custom-caret"></div>
  </div>
  <div class="query-buttons">
    <button id="queryUpdateBtn" class="disabled" onclick="handleQueryUpdateEvent()"
            title="Apply changes from query to the graph">Update
    </button>
    <button id="queryResetBtn" class="red" onclick="resetQuery();" title="Reset query to match UI">Reset</button>
  </div>
</div>
</body>
</html>
