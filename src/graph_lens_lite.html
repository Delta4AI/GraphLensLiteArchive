<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delta4 | Graph Lens Lite</title>
  <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='4' y='24' font-size='24'>🔍</text></svg>"
        type="image/svg+xml">
<!-- @antv/g6 version 5.0.46, modified according to https://github.com/antvis/G6/issues/7195 -->
  <script inline src="lib/g6.min.js"></script>
  <script inline src="lib/exceljs.min.js"></script>
  <script type="module" src="gll.js"></script>
  <link inline rel="stylesheet" href="style.css?v=1" />
</head>
<body>
<div id="loadingOverlay" class="container">
  <div id="loadingInnerContent">
    <div class="loader"></div>
    <h3 id="loadingHeader">Loading ..</h3>
    <span id="loadingText" class="h7">Please wait</span>
  </div>
</div>
<div id="mainContent">
  <div id="sidebar">
    <div class="sidebar-resize-handle"></div>
    <div id="sidebarContentContainer">
      <div class="header-row">
        <h3 id="appHeader" class="disabled-header" onclick="cache.ui.reloadApp()">
          <img src="delta-4-icon.png" alt="Delta4 Icon" style="height: 1em; vertical-align: middle; margin-right: 0.3em;">
          Graph Lens Lite <span id="versionInfo" style="font-size: 0.6em; color: #666; font-weight: normal;"></span>
        </h3>
        <div class="showOnLoad button-group">
          <button id="metricsToggleBtn" class="showOnLoad medium-btn" title="Toggle network metrics panel (M)" onclick="cache.metrics.toggleUI()">📊</button>
          <button id="dataToggleBtn" class="showOnLoad medium-btn" title="Toggle data editor (D)" onclick="cache.ui.toggleDataEditor()">🔢</button>
          <button id="queryToggleBtn" class="showOnLoad medium-btn" title="Toggle query editor (Q)" onclick="cache.ui.toggleQueryEditor()">📝</button>
          <button id="exportImage" class="showOnLoad medium-btn" onclick="cache.io.exportPNG()" title="Save Image (P)">📷️</button>
          <button id="exportModel" class="showOnLoad medium-btn" onclick="cache.io.exportGraphAsJSON()" title="Save Model (S)">💾</button>
        </div>
      </div>
      <div class="hideOnLoad">
        <input type="file" id="fileInput" name="fileInput" onchange="cache.io.loadFileWrapper(event);"
               title="Load graph data from Excel (.xlsx, .xls) or Graph Lens Lite exports (.json)"
               accept=".json, .xls, .xlsx"/>
      </div>
      <div class="hideOnLoad">
        <button onclick="cache.io.downloadExcelTemplate()" class="mt-2">📥 Download Excel Template</button>
        <br>
        <button onclick="loadDemoData()" class="mt-2">🔍 Load from STRING Database</button>
      </div>
      <div class="showOnLoad">
        <hr>
        <label for="selectView">Workspace:</label>
        <select name="selectView" id="selectView" onchange="cache.lm.changeLayout()"></select>
        <button class="small-btn red disabled" id="removeSelectedLayoutButton" title="Delete current workspace" onclick="cache.lm.removeSelectedLayout()">&nbsp;✗&nbsp;</button>
        <button class="small-btn green" title="Create new workspace" onclick="cache.lm.addLayout()" >&nbsp;✚&nbsp;</button>
        <div class="button-separator"></div>
        <button class="small-btn" title="Fit graph to screen (F)" onclick="cache.graph.fitView()">⛶</button>
        <button id="hideDisconnectedBtn" class="small-btn red" title="Hide all nodes and edges that are not connected to any other node or edge" onclick="cache.gcm.toggleCleanUpDanglingElements(this)">🚫</button>
        <div id="debugDiv" class="inline"></div>
        <br>
        <h5 class="purple">Shown:
          <span id="visibleNodes" class="red">0</span>/<span id="totalNodes">0</span> nodes,
          <span id="visibleEdges" class="red">0</span>/<span id="totalEdges">0</span> edges
        </h5>
        <hr>
        <div id="metricsContainer"></div>
        <div id="filterContainer">
          <button id="editBtn" class="showOnLoad medium-btn" title="Toggle Edit mode (E)" onclick="cache.ui.toggleEditMode()">⚙️</button>
        </div>
      </div>
    </div>
    <div id="sidebarStatusContainer"></div>
  </div>
  <div id="outerGraphContainer">
    <div id="selectedElementsContainer" class="showOnLoad">
      Selected nodes: <span id="selectedNodes" class="red"></span>
      <button id="focusNodesBtn" class="tiny-btn disabled ml-1" title="Center and zoom the viewport to show all selected nodes"
              onclick="cache.gcm.focusNodes()">🔍</button>
      <button id="deselectNodesBtn" class="tiny-btn red disabled" title="Clear node selection"
              onclick="cache.sm.toggleSelectionForAllNodes(false)">×</button>
      <span id="manualBubbleGroupButtonContainer" class="manual-group-container"></span>
      <br>
      Selected edges: <span id="selectedEdges" class="red"></span>
      <button id="focusEdgesBtn" class="tiny-btn disabled ml-1" title="Center and zoom the viewport to show all selected edges"
              onclick="cache.gcm.focusEdges()">🔍</button>
      <button id="deselectEdgesBtn" class="tiny-btn red disabled" title="Clear edge selection"
              onclick="cache.sm.toggleSelectionForAllEdges(false)">×</button>
      <hr>
      <div id="lassoWrapper" class="showOnLoad small-btn"><button id="lassoToggleBtn" class="lasso-icon" title="Toggle lasso selection (L)" onclick="cache.ui.toggleLassoSelection()"></button></div>
      <div class="button-separator"></div>
      <button class="small-btn disabled" title="Reset style for selected elements" id="resetSelectedElementsStyleBtn"
              onclick="cache.style.resetStyleForSelectedElements()">⟳</button>
      <div class="button-separator"></div>
      <button class="small-btn disabled" title="Undo Selection" id="undoSelectionBtn"
              onclick="cache.sm.undoSelection()">↩</button>
      <button class="small-btn disabled" title="Redo Selection" id="redoSelectionBtn"
              onclick="cache.sm.redoSelection()">↪</button>
      <div class="button-separator"></div>
      <button id="styleToggleBtn" class="small-btn showOnLoad" title="Open styling panel (Y)" onclick="cache.ui.toggleStylingPanel()">🎨</button>
      <button class="small-btn" title="Expand selection editor" id="selectionEditorToggleBtn"
              onclick="cache.ui.toggleSelectionEditor()">▾</button>
      <div id="manualGroupSeparator" class="button-separator" style="display: none;"></div>
      <span id="manualBubbleGroupStatus" class="manual-group-status" style="display: none;"></span>
      <button id="clearManualGroupsBtn" class="small-btn red" title="Clear all manual bubble groups"
              onclick="cache.bs.clearAllManualGroups()" style="display: none;">×</button>
      <div id="selectionEditorPanel" class="selection-editor-panel"></div>
    </div>
    <div id="innerGraphContainer"></div>
  </div>
  <div id="rightSidebar">
    <div class="panel-header panel-header-full-width">
      <span class="panel-header-text">Styling Panel</span>
      <button id="rightSidebarCloseBtn" class="panel-header-btn" title="Close styling panel"
              onclick="cache.ui.toggleStylingPanel()">×</button>
    </div>
    <div id="rightSidebarContentContainer">
      <div id="stylingPanelContent">
        <!-- Styling controls will be populated here -->
      </div>
    </div>
  </div>
</div>
<div id="bottomBar">
  <div class="resize-handle"></div>
  <div class="panel-header panel-header-full-width">
    <span id="bottomBarHeaderText" class="panel-header-text">Query Editor</span>
    <div class="panel-header-center-buttons">
      <div class="query-buttons">
        <button id="queryUpdateBtn" class="purple disabled" onclick="cache.qm.handleQueryUpdateEvent()"
                title="Apply the query to filter the graph">🔍 Filter</button>
        <button id="querySelectBtn" class="blue disabled" onclick="cache.qm.handleQuerySelectEvent()"
                title="Apply the query to select nodes in the graph without filtering">🎯 Select</button>
        <button id="queryResetBtn" class="pink" onclick="cache.qm.resetQuery();" title="Reset query to match UI filters">⟳ Sync</button>
        <button id="queryClearBtn" class="red" onclick="cache.qm.clearQuery();" title="Clear query">✗ Clear</button>
      </div>
      <div class="data-buttons" style="display: none;">
        <button id="updateDataTableBtn" class="blue" onclick="cache.dataTable.update()"
                title="Update the graph after modifying the data table">✔ Apply</button>
        <button id="resetDataTableBtn" onclick="cache.dataTable.reset()" class="pink"
                title="Reset the data table to current graph state">⟳ Reset</button>
        <button onclick="cache.dataTable.addNode()" class="blue" title="Add a node"><strong>+</strong>&nbsp;Node</button>
        <button onclick="cache.dataTable.addEdge()" class="blue" title="Add an edge"><strong>+</strong>&nbsp;Edge</button>
        <button onclick="cache.dataTable.addColumn()" class="blue" title="Add a new property column"><strong>+</strong>&nbsp;Column</button>
        <button id="exportDataTableBtn" onclick="cache.dataTable.exportToExcel()" class="green"
                title="Export the data table and styling properties as Excel">⤓ Export</button>
      </div>
    </div>
    <div class="panel-header-buttons">
      <button id="bottomBarHelpBtn" class="panel-header-btn info-btn" title="Display query editor help" onclick="cache.qm.showQueryHelp();">🛈</button>
      <button id="bottomBarCloseBtn" class="panel-header-btn" title="Close bottom panel"
              onclick="cache.ui.closeBottomBar()">×</button>
    </div>
  </div>
  <div class="bottom-bar-content">
    <div id="queryEditor" class="editor-panel">
      <div id="queryOverlay" aria-hidden="true"></div>
      <div id="queryTextArea" contenteditable="true" spellcheck="false" oninput="cache.qm.handleQueryValidationEvent();"></div>
      <div id="queryCaret" class="custom-caret"></div>
    </div>
    <div id="dataEditor" class="editor-panel" style="display: none;">
      <div id="dataTableContainer">
        <table id="dataTable" class="data-table">
          <thead id="dataTableHead"></thead>
          <tbody id="dataTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>
</body>
</html>
