<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delta4 | Graph Lens Lite</title>
  <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='4' y='24' font-size='24'>🔍</text></svg>"
        type="image/svg+xml">
<!-- @antv/g6 version 5.0.46, modified according to https://github.com/antvis/G6/issues/7195 -->
  <script inline src="lib/g6.min.js"></script>
  <script inline src="lib/exceljs.min.js"></script>
  <script inline src="gll.js"></script>
  <link inline rel="stylesheet" href="style.css" />
</head>
<body>
<div id="loadingOverlay" class="container">
  <div id="loadingInnerContent">
    <div class="loader"></div>
    <h3 id="loadingHeader">Loading ..</h3>
    <span id="loadingText" class="h7">Please wait</span>
  </div>
</div>
<div id="mainContent">
  <div id="sidebar">
    <div id="sidebarContentContainer">
      <div class="header-row">
        <h3>Graph Lens Lite</h3>
        <div class="showOnLoad button-group">
          <button id="exportModel" class="showOnLoad medium-btn" onclick="exportGraphAsJSON()" title="Save Model (S)">💾</button>
          <button id="exportImage" class="showOnLoad medium-btn" onclick="exportPNG()" title="Save Image (P)">📷️</button>
          <button id="metricsToggleBtn" class="showOnLoad medium-btn" title="Toggle network metrics panel (M)" onclick="cache.metrics.toggleUI()">📊</button>
          <button id="dataToggleBtn" class="showOnLoad medium-btn" title="Toggle data editor (D)" onclick="toggleDataEditor()">🔢</button>
          <button id="queryToggleBtn" class="showOnLoad medium-btn" title="Toggle query editor (Q)" onclick="toggleQueryEditor()">📝</button>
          <div id="lassoWrapper" class="showOnLoad medium-btn"><button id="lassoToggleBtn" class="lasso-icon" title="Toggle lasso selection (L)" onclick="toggleLassoSelection()"></button></div>
          <button id="editBtn" class="showOnLoad medium-btn" title="Toggle Edit mode (E)" onclick="toggleEditMode()">⚙️</button>
        </div>
      </div>
      <input type="file" id="fileInput" name="fileInput" onchange="loadFileWrapper(event);"
             accept=".json, .xls, .xlsx, .csv, .tab"/>
      <div class="hideOnLoad">
        <button onclick="downloadExcelTemplate()" class="mt-2">Download Template</button>
        <button onclick="loadDemoData()" class="mt-2">Load Demo Data</button>
      </div>
      <div class="showOnLoad">
        <hr>
        <label for="selectView">View Preset:</label>
        <select name="selectView" id="selectView" onchange="changeLayout()"></select>
        <button class="small-btn red disabled" id="removeSelectedLayoutButton" title="Delete current view preset" onclick="removeSelectedLayout()">&nbsp;✗&nbsp;</button>
        <button class="small-btn green" title="Create new view preset" onclick="addLayout()" >&nbsp;✚&nbsp;</button>
        <div class="button-separator"></div>
        <button class="small-btn" id="resetLayoutButton" title="Reset layout to default (R)" onclick="resetLayout()">⭯</button>
        <button class="small-btn" title="Fit graph to screen (F)" onclick="graph.fitView()">⛶</button>
        <button class="small-btn red" title="Hide all nodes and edges that are not connected to any other node or edge" onclick="toggleCleanUpDanglingElements(this)">🚫</button>
        <div id="debugDiv" class="inline"></div>
        <br>
        <h5 class="purple">Shown:
          <span id="visibleNodes" class="red">0</span>/<span id="totalNodes">0</span> nodes,
          <span id="visibleEdges" class="red">0</span>/<span id="totalEdges">0</span> edges
        </h5>
        <hr>
        <div class="show-on-edit-full-width">
          <label for="selectStash">Filter Profiles:</label>
          <button class="small-btn" id="addStash"
                  title="Save current filter settings and bubble groups as a new profile (can be reapplied in different view)"
                  onclick="saveStash()">📥
          </button>
          <select class="disabled" name="selectStash" id="selectStash"></select>
          <button class="small-btn red disabled" id="removeStash"
                  title="Delete selected profile"
                  onclick="removeStash()">✗
          </button>
          <button class="small-btn orange disabled" id="overwriteStash"
                  title="Overwrite selected profile with current settings"
                  onclick="overwriteStash()">⟳
          </button>
          <button class="small-btn green disabled" id="applyStash"
                  title="Apply selected profile to current view"
                  onclick="loadStash()">✔
          </button>
          <hr>
        </div>
        <div id="metricsContainer"></div>
        <div class="edit-container show-on-edit">
          <div id="staticStyleDiv"></div>
          <hr>
        </div>
        <div id="filterContainer"></div>
      </div>
    </div>
    <div id="sidebarStatusContainer"></div>
  </div>
  <div id="outerGraphContainer">
    <div id="selectedElementsContainer" class="hidden">
      Selected nodes: <span id="selectedNodes" class="red"></span>
      <button id="focusNodesBtn" class="tiny-btn disabled ml-1" title="Center and zoom the viewport to show all selected nodes"
              onclick="focusNodes()">🔍</button>
      <button id="deselectNodesBtn" class="tiny-btn red disabled" title="Clear node selection"
              onclick="toggleSelectionForAllNodes(false)">×</button>
      <br>
      Selected edges: <span id="selectedEdges" class="red"></span>
      <button id="focusEdgesBtn" class="tiny-btn disabled ml-1" title="Center and zoom the viewport to show all selected edges"
              onclick="focusEdges()">🔍</button>
      <button id="deselectEdgesBtn" class="tiny-btn red disabled" title="Clear edge selection"
              onclick="toggleSelectionForAllEdges(false)">×</button>
      <hr>
      <button class="small-btn disabled" title="changed from alignUIWIthJSConstants()" id="resetSelectedElementsStyleBtn"
              onclick="resetStyleForSelectedElements()">⟳</button>
      <div class="button-separator"></div>
      <button class="small-btn disabled" title="Undo Selection" id="undoSelectionBtn"
              onclick="undoSelection()">↩</button>
      <button class="small-btn disabled" title="Redo Selection" id="redoSelectionBtn"
              onclick="redoSelection()">↪</button>
    </div>
    <div id="innerGraphContainer"></div>
  </div>
</div>
<div id="bottomBar">
  <div class="resize-handle"></div>
  <div id="queryEditor" class="editor-panel">
    <div id="queryOverlay" aria-hidden="true"></div>
    <div id="queryTextArea" contenteditable="true" spellcheck="false" oninput="handleQueryValidationEvent();"></div>
    <div id="queryCaret" class="custom-caret"></div>
    <button class="query-clear-button" title="Clear query" onclick="clearQuery();">×</button>
  </div>
  <div id="dataEditor" class="editor-panel" style="display: none;">
    <div id="dataTableContainer">
      <table id="dataTable" class="data-table">
        <thead id="dataTableHead"></thead>
        <tbody id="dataTableBody"></tbody>
      </table>
    </div>
  </div>
  <div class="query-buttons">
    <button id="queryUpdateBtn" class="disabled" onclick="handleQueryUpdateEvent()"
            title="Apply the query to filter the graph">Update</button>
    <button id="querySelectBtn" class="disabled" onclick="handleQuerySelectEvent()"
            title="Apply the query to select nodes in the graph without filtering">Select</button>
    <button id="queryResetBtn" class="red" onclick="resetQuery();" title="Reset query to match UI filters">Reset</button>
  </div>

  <div class="data-buttons" style="display: none;">
    <button onclick="dataTable.update()" title="Update the graph after modifying the data table">Apply</button>
    <button onclick="dataTable.reset()" class="red" title="Reset the data table">Reset</button>
    <button onclick="dataTable.exportToExcel()" class="blue" title="Export the data table and styling properties as Excel">Export</button>
    <button onclick="dataTable.addNode()" class="pink" title="Add a node">Add Node</button>
    <button onclick="dataTable.addEdge()" class="pink" title="Add an edge">Add Edge</button>
  </div>

  <div class="editor-help-icon" id="queryHelpIconDiv">
    <button class="info-btn" title="Display query editor help" onclick="showQueryHelp();">🛈</button>
  </div>

  <div class="editor-help-icon" style="display: none;" id="dataHelpIconDiv">
    <button class="info-btn" title="Display data editor help" onclick="showDataHelp();">🛈</button>
  </div>

</div>
</body>
</html>
