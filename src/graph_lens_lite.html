<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delta4 | Graph Lens Lite</title>
  <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text x='4' y='24' font-size='24'>🔍</text></svg>"
        type="image/svg+xml">
<!-- @antv/g6 version 5.0.46, modified according to https://github.com/antvis/G6/issues/7195 -->
  <script inline src="lib/g6.min.js"></script>
  <script inline src="lib/xlsx.full.min.js"></script>
  <script inline src="gll.js"></script>
  <link inline rel="stylesheet" href="style.css" />
</head>
<body>
<div id="loadingOverlay" class="container">
  <div id="loadingInnerContent">
    <div class="loader"></div>
    <h3 id="loadingHeader">Loading ..</h3>
    <span id="loadingText" class="h7">Please wait</span>
  </div>
</div>
<div id="mainContent">
  <div id="sidebar">
    <div id="sidebarContentContainer">
      <h3>Graph Lens Lite</h3>
      <input type="file" id="fileInput" name="fileInput" onchange="loadFileWrapper(event);"
             accept=".json, .xls, .xlsx, .csv, .tab"/>
      <div class="showOnLoad button-group">
        <button id="exportModel" class="showOnLoad medium-btn" onclick="exportGraphAsJSON()" title="Save Model (S)">💾</button>
        <button id="exportImage" class="showOnLoad medium-btn" onclick="exportPNG()" title="Save Image (P)">📷️</button>
        <button id="metricsToggleBtn" class="showOnLoad medium-btn" title="Toggle network metrics panel (M)" onclick="cache.metrics.toggleUI()">📊</button>
        <button id="queryToggleBtn" class="showOnLoad medium-btn" title="Toggle query editor (Q)" onclick="toggleQueryEditor()">📝</button>
        <button id="editBtn" class="showOnLoad medium-btn" title="Toggle Edit mode (E)" onclick="toggleEditMode()">⚙️</button>
      </div>
      <div class="showOnLoad">
        <hr>
        <h3>View Options</h3>
        <label for="selectView">Network View:</label>
        <select name="selectView" id="selectView" onchange="changeLayout()"></select>
        <button class="small-btn" id="resetLayoutButton" title="Reset View (R)" onclick="resetLayout()">⭯</button>
        <button class="small-btn" title="Fit View (F)" onclick="graph.fitView()">⛶</button>
        <button class="small-btn red" title="Hide all nodes and edges that are not connected to any other node or edge" onclick="toggleCleanUpDanglingElements(this)">🚫</button>
        <button class="small-btn green show-on-edit" title="Create New View" onclick="addLayout()" >&nbsp;✚&nbsp;</button>
        <button class="small-btn red show-on-edit disabled" id="removeSelectedLayoutButton" title="Remove View" onclick="removeSelectedLayout()">&nbsp;✗&nbsp;</button>
        <button class="small-btn show-on-edit" title="Save filter settings to stash (to be reapplied in different view)" onclick="saveFiltersToStash(true)">📥</button>
        <button class="small-btn show-on-edit disabled" id="loadFromStashBtn" title="Load filter settings from stash" onclick="loadFiltersFromStash()">📤</button>
        <div id="debugDiv" class="inline"></div>
        <br>
        <h5 class="purple">Shown:
          <span id="visibleNodes" class="red">0</span>/<span id="totalNodes">0</span> nodes,
          <span id="visibleEdges" class="red">0</span>/<span id="totalEdges">0</span> edges
        </h5>
        <hr>
        <div id="metricsContainer"></div>
        <div class="edit-container show-on-edit">
          <div id="staticStyleDiv"></div>
          <hr>
        </div>
        <div id="filterContainer"></div>
      </div>
    </div>
    <div id="sidebarStatusContainer"></div>
  </div>
  <div id="outerGraphContainer">
    <div id="selectedElementsContainer" class="hidden">
      Selected nodes: <span id="selectedNodes" class="red"></span>
      <button id="deselectNodesBtn" class="tiny-btn red is-disabled ml-1"
              onclick="toggleSelectionForAllNodes(false)">×</button>
      <br>
      Selected edges: <span id="selectedEdges" class="red"></span>
      <button id="deselectEdgesBtn" class="tiny-btn red is-disabled ml-1"
              onclick="toggleSelectionForAllEdges(false)">×</button>
      <hr>
      <button class="small-btn disabled" title="Undo Selection" id="undoSelectionBtn"
              onclick="undoSelection()">↩</button>
      <button class="small-btn disabled" title="Redo Selection" id="redoSelectionButton"
              onclick="redoSelection()">↪</button>
    </div>
    <div id="innerGraphContainer"></div>
  </div>
</div>
<div id="bottomBar">
  <div id="queryEditor">
    <div id="queryOverlay" aria-hidden="true"></div>
    <div id="queryTextArea" contenteditable="true" spellcheck="false" oninput="handleQueryValidationEvent();"></div>
    <div id="queryCaret" class="custom-caret"></div>
  </div>
  <div class="query-buttons">
    <button id="queryUpdateBtn" class="disabled" onclick="handleQueryUpdateEvent()"
            title="Apply changes from query to the graph">Update
    </button>
    <button id="queryResetBtn" class="red" onclick="resetQuery();" title="Reset query to match UI">Reset</button>
  </div>
  <div class="query-help-icon">
    <button id="foo" class="info-btn" title="Display help" onclick="showQueryHelp();">🛈</button>
  </div>
</div>
</body>
</html>
