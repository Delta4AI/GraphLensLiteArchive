<html>
<head>
  <title>deselection bug showcase</title>
  <script src="https://unpkg.com/@antv/g6@5/dist/g6.min.js"></script>
  <script>
    const { Graph, GraphEvent } = G6;
    let graph = null;

    document.addEventListener('DOMContentLoaded', async () => {
      graph = createGraph();

      graph.on(GraphEvent.AFTER_TRANSFORM, async () => {
        await updateZoomAndPos();
      });

      graph.once(GraphEvent.AFTER_RENDER, async () => {
        await updateZoomAndPos();
      })

      await graph.render();
    });

    function createGraph() {
      return new Graph({
        container: 'container',
        width: window.innerWidth,
        height: window.innerHeight,
        behaviors: [
          {
            type: 'zoom-canvas',
          },
          {
            type: 'drag-canvas',
          }
        ],
        data: {
          nodes: [
            {id: '1', style: {label: true, labelText: '1', x: 100, y: 100}},
            {id: '2', style: {label: true, labelText: '2', x: 200, y: 200}},
            {id: '3', style: {label: true, labelText: '3', x: 300, y: 300}},
          ]
        },
      });
    }

    async function translateToHotfix(pos) {
      const currentZoom = await graph.getZoom();
      await graph.zoomTo(1);
      await graph.translateTo(pos);
      await graph.zoomTo(currentZoom);
    }

    async function updateZoomAndPos() {
      try {
        document.getElementById('zoom').innerText = await graph.getZoom();
        document.getElementById('pos').innerText = await graph.getPosition();
      } catch (e) {
        console.log(e);
      }
    }

  </script>
</head>
<body>
<div>
  Steps to reproduce (v5.0.47):
  <br>
  - Press buttons in the following order [2] > [4] > [5]: position is correct for both translateTo functions with zoom = 1
  <br>
  - Press buttons in the following order [3] > [4] > [5]: position differ for [4] and [5] with same coordinates and zoom != 1
  <br>
  Zoom: <span id="zoom"></span>
  <br>
  Position: <span id="pos"></span>
  <br>
  <button onclick="graph.fitView()">[1] fitView</button>
  <button onclick="graph.zoomTo(1)">[2] zoomTo(1)</button>
  <button onclick="graph.zoomTo(2)">[3] zoomTo(2)</button>
  <button onclick="translateToHotfix([100, 100])">[4] translateToHotfix([100, 100])</button>
  <button onclick="graph.translateTo([100, 100])">[5] translateTo([100, 100])</button>
</div>
<div id="container" style="width: 100%; height: 100%; border: 1px solid red;"></div>
</body>
</html>
