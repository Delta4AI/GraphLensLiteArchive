<html>
<head>
  <title>deselection bug showcase</title>
  <script src="https://unpkg.com/@antv/g6@5/dist/g6.min.js"></script>
<!--  <script src="../src/g6.min.js"></script>-->
  <script>
    const {
      Graph,
    } = G6;

    let graph = null;

    document.addEventListener('DOMContentLoaded', async () => {
      graph = createGraph();
      await graph.render();
    });

    function createGraph() {
      const dummyData = getDummyData(500, 1000);
      const randomNodes = selectRandomNodes(dummyData.nodes, 100);

      return new Graph({
        container: 'container',
        width: window.innerWidth,
        height: window.innerHeight,
        autoFit: false,
        animation: false,
        autoResize: true,
        node: {
          state: {
            highlight: {
              fill: '#C33D35', halo: true, lineWidth: 0,
            }, dim: {
              fill: '#E4E3EA',
            },
          },
        },
        edge: {
          state: {
            highlight: {
              stroke: '#C33D35',
            },
            selected: {
              stroke: '#C33D35',
            }
          },
        },
        behaviors: [
          {
            type: 'zoom-canvas',
            key: 'zoom-canvas',
          },
          {
            type: "click-select",
            key: "click-select",
            multiple: true,
            state: "selected",
            trigger: [
              "shift"
            ],
          },
          {
            type: "lasso-select",
            key: "lasso-select",
            trigger: "drag",
            style: {
              fill: '#C33D35',
              fillOpacity: 0.3,
              stroke: '#C33D35'
            }
          },
        ],
        plugins: [
          {
            key: "minimap",
            type: "minimap",
            position: "bottom-right",
          },
          {
            key: "bubble-sets",
            type: "bubble-sets",
            members: randomNodes.members,
            // avoidMembers: [],  // fast
            avoidMembers: randomNodes.avoidMembers,  // extremely slow
            fill: '#403C53',
            fillOpacity: 0.25,
            stroke: '#C33D35',
            strokeOpacity: 1,
          },
        ],
        layout: {
          type: "force",
          gravity: 10,
        },
        data: dummyData,
      });
    }

    function getDummyData(maxNodes, maxEdges) {
      const nodes = Array.from({length: maxNodes}, (_, i) => ({
        id: String(i + 1)
      }));

      const edges = new Set();
      while (edges.size < maxEdges) {
        const source = String(Math.floor(Math.random() * maxNodes) + 1);
        const target = String(Math.floor(Math.random() * maxNodes) + 1);

        if (source !== target) {
          const edgeKey = [source, target].sort().join('-');
          edges.add(edgeKey);
        }
      }

      const edgeObjects = Array.from(edges).map(edge => {
        const [source, target] = edge.split('-');
        return {source, target};
      });

      return {
        nodes,
        edges: edgeObjects
      };
    }

    function selectRandomNodes(nodes, amount) {
      amount = Math.max(0, Math.min(amount, nodes.length));

      const nodeIds = nodes.map(node => node.id);

      for (let i = nodeIds.length - 1; i >= 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [nodeIds[i], nodeIds[j]] = [nodeIds[j], nodeIds[i]];
      }

      return {
        members: nodeIds.slice(0, amount),
        avoidMembers: nodeIds.slice(amount)
      };
    }

  </script>
</head>
<body>
<p>Steps to reproduce (v5.0.47): Click on a node > Click on an empty spot on the canvas to trigger de-selection > UI freezes, endless parallel draw events > De-selection finishes after ~2 minutes</p>
<div id="container"></div>
</body>
</html>
